name = "coi-email-receiver"
main = "coi-email-worker.js"
compatibility_date = "2024-01-01"

[vars]
PAYTRACK_API_URL = "https://paytrack.lemedspa.app"

# Set EMAIL_WORKER_SECRET via: wrangler secret put EMAIL_WORKER_SECRET

# NOTE: Email routing is NOT configured in wrangler.toml.
# After deploying this worker, configure the Email Routing rule in the
# Cloudflare dashboard: Email → Email Routing → Routing Rules → "Send to a Worker"
# Point coi@lemedspa.app → coi-email-receiver
